<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Get accurate weather forecasts and current weather conditions with OpenWeather." />
    <title>OpenWeather Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="stylesheet" href="/src/index.css" />
</head>
<body>
    <div id="root"></div> <!-- This is the root element for React -->

    <div class="background">
        <div class="content">
            <h1>Weather Dashboard</h1>
            <p>Access current weather, forecasts, and historical data quickly and easily, designed for simplicity.</p>
        </div>
    </div>
    
    <div class="controls">
        <div class="search-container">
            <input type="text" placeholder="Search city" class="search-input" />
            <button id="searchButton" class="search-button">Search</button>
        </div>
        <div class="options">
            <select class="language-selector" id="language-selector">
                <!-- Options will be populated here -->
            </select>
            <select class="theme-toggle">
                <option value="">Toggle Theme</option>
                <option value="metric">Metric</option>
                <option value="imperial">Imperial</option>
            </select>
        </div>
    </div>

    <script type="module">
        import { languages } from './src/constants/languages.js'; 

        const languageSelector = document.getElementById('language-selector');

        languages.forEach(language => {
            const option = document.createElement('option');
            option.value = language.code;
            option.textContent = language.name;
            languageSelector.appendChild(option);
        });
    </script>
    
    <script type="module" src="/src/main.jsx" defer></script>
</body>
</html>
